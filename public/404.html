<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Page Not Found</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f172a;
        color: #cbd5e1;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .container {
        text-align: center;
        padding: 2rem;
        max-width: 600px;
      }
      h1 {
        font-size: 4rem;
        color: #fff;
        margin-bottom: 1rem;
      }
      p {
        font-size: 1.125rem;
        margin-bottom: 2rem;
      }
      a {
        display: inline-block;
        padding: 0.75rem 1.5rem;
        background: #3b82f6;
        color: #fff;
        text-decoration: none;
        border-radius: 0.5rem;
        transition: background 0.3s;
      }
      a:hover {
        background: #2563eb;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>404</h1>
      <p>Page not found. Let's get you back on track.</p>
      <a href="/">Go Home</a>
    </div>
  </body>
</html>
